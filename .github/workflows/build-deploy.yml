name: Build & Deploy (ACA)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: build-deploy-aca
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.set-outputs.outputs.api }}
      worker: ${{ steps.set-outputs.outputs.worker }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            api:
              - 'src/**'
              - 'api.Dockerfile'
              - 'pyproject.toml'
              - 'scripts/**'
            worker:
              - 'worker.Dockerfile'
              - 'src/boltz2_service/worker/**'
      - name: Set change outputs
        id: set-outputs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
          fi

  build-api-image:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: api.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/boltz2-api:sha-${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/boltz2-api:latest

  deploy:
    needs: [detect-changes, build-api-image]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      needs.build-api-image.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RESOURCE_GROUP: ${{ vars.ACA_RESOURCE_GROUP }}
      CONTAINERAPPS_ENV: ${{ vars.ACA_CONTAINERAPPS_ENV }}
    steps:
      - uses: actions/checkout@v5
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy
        env:
          API_IMAGE_TAG: sha-${{ github.sha }}
          WORKER_IMAGE_TAG: latest
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          AZURE_STORAGE_ACCOUNT_URL: ${{ secrets.AZURE_STORAGE_ACCOUNT_URL }}
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          SERVICE_BUS_NAMESPACE: ${{ secrets.SERVICE_BUS_NAMESPACE }}
          SERVICE_BUS_QUEUE_NAME: ${{ secrets.SERVICE_BUS_QUEUE_NAME || 'boltz2-predict-jobs' }}
          SERVICE_BUS_CONNECTION_STRING: ${{ secrets.SERVICE_BUS_CONNECTION_STRING }}
        run: bash scripts/aca_deploy.sh
